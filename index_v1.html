<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="spine-player.css">
    <script src="spine-player.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; margin: 0; }
        header { 
            background: #333; padding: 10px 20px; display: flex; 
            align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        #gallery { display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; justify-content: center; }
        .spine-card { background: #2a2a2a; border-radius: 8px; width: 320px; border: 1px solid #444; overflow: hidden; }
        .player-container { width: 100%; height: 280px; background: #000; }
        .title { padding: 10px; font-size: 12px; text-align: center; color: #aaa; background: #222; }
        .pagination { display: flex; gap: 15px; align-items: center; }
        button { background: #444; color: white; border: 1px solid #666; padding: 5px 15px; border-radius: 4px; cursor: pointer; }
        button:hover:not(:disabled) { background: #555; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>
    <header>
        <div id="status">Đang quét file Spine...</div>
        <div class="pagination" id="pagination-controls" style="display: none;">
            <button id="prevBtn" onclick="changePage(-1)">◀ Trước</button>
            <span id="pageInfo">1 / 1</span>
            <button id="nextBtn" onclick="changePage(1)">Sau ▶</button>
        </div>
    </header>

    <div id="gallery"></div>

    <script>
        let allData = [];
        let currentPage = 1;
        const itemsPerPage = 10;

        // Tự động chạy khi Python API đã sẵn sàng
        window.addEventListener('pywebviewready', async () => {
            await autoLoad();
        });

        async function autoLoad() {
            const status = document.getElementById('status');
            try {
                // Gọi hàm tự động quét từ Python
                const data = await pywebview.api.get_spine_files_auto();
                
                if (data && data.length > 0) {
                    allData = data;
                    document.getElementById('pagination-controls').style.display = 'flex';
                    renderPage();
                } else {
                    status.innerText = "Không tìm thấy file .json & .atlas nào trong thư mục gốc.";
                }
            } catch (err) {
                status.innerText = "Lỗi kết nối Python API.";
                console.error(err);
            }
        }

        function renderPage() {
            const gallery = document.getElementById('gallery');
            const totalPages = Math.ceil(allData.length / itemsPerPage);
            
            document.getElementById('pageInfo').innerText = `${currentPage} / ${totalPages}`;
            document.getElementById('prevBtn').disabled = (currentPage === 1);
            document.getElementById('nextBtn').disabled = (currentPage === totalPages);
            document.getElementById('status').innerText = `Tìm thấy ${allData.length} file.`;

            gallery.innerHTML = ''; 

            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = allData.slice(start, end);

            pageItems.forEach((item, index) => {				
                const containerId = 'player-' + index;
                const card = document.createElement('div');
                card.className = 'spine-card';
                card.innerHTML = `
                    <div id="${containerId}" class="player-container"></div>
                    <div class="title">${item.name}</div>
                `;
                gallery.appendChild(card);

                setTimeout(() => {
                    if (typeof spine === 'undefined') return;
                    new spine.SpinePlayer(containerId, {
                        jsonUrl: item.json,
                        atlasUrl: item.atlas,
						// Hàm quan trọng để fix lỗi nạp ảnh (.png)
						// Thêm tiền tố để đảm bảo nạp đúng ảnh
						rawDataUriResolver: function (path) {
							// Lấy thư mục của file json để tìm file png
							let parts = item.json.split('/');
							parts.pop();s
							let folder = parts.join('/');
							return (folder ? folder + '/' : '') + path;
						},
                        alpha: true,
                        showControls: true,
                        backgroundColor: "#1a1a1a",
                        viewport: { padLeft: "5%", padRight: "5%", padTop: "5%", padBottom: "5%" },
                        success: function() {console.log("OK:", item.json);},
                        error: function(p, r) { 
							console.error("Lỗi Spine:", r);
							document.getElementById(containerId).innerHTML = `<div style="color:red;font-size:10px">${r}</div>`;
						},
                    });
                }, index * 150);
            });
        }

        function changePage(offset) {
            currentPage += offset;
            renderPage();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
